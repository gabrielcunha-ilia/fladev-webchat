<!DOCTYPE html>

    <!-- Preload do bootstrap para iniciar o download o mais cedo possível -->

          href="https://nacao--hml.sandbox.my.site.com/ESWWebChatGitHub1782823545723/assets/js/bootstrap.min.js"
          as="script">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            padding: 40px;
            background-color: #cc0000;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        h1 { font-size: 24px; margin-bottom: 8px; }
        p { font-size: 14px; opacity: 0.85; margin-top: 6px; }
        .badge {
            display: inline-block;
            margin-top: 16px;
            padding: 4px 12px;
            background: #000;
            border-radius: 20px;
            font-size: 12px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔴⚫ Flamengo — Teste de Chat</h1>
        <p>Ambiente: <strong>FLAHML (Homologação)</strong></p>
        <p>O chat será aberto automaticamente.</p>
        <span class="badge">HML</span>
    </div>

    <script type='text/javascript'>
        function initEmbeddedMessaging() {
            try {
                embeddedservice_bootstrap.settings.language = 'pt-BR';
                embeddedservice_bootstrap.init(
                    '00DHZ000009eb0T',
                    'Web_Chat_Git_Hub',
                    'https://nacao--hml.sandbox.my.site.com/ESWWebChatGitHub1782823545723',
                    {
                        scrt2URL: 'https://nacao--hml.sandbox.my.salesforce-scrt.com'
                    }
                );
                // Abre o chat automaticamente após inicializar
                embeddedservice_bootstrap.utilAPI.launchChat();
            } catch (err) {
                console.error('Error loading Embedded Messaging: ', err);
            }
        }
    </script>

    <!-- Script carregado com fetchpriority=high para priorizar no browser -->
    <script
        type='text/javascript'
        fetchpriority='high'
        src='https://nacao--hml.sandbox.my.site.com/ESWWebChatGitHub1782823545723/assets/js/bootstrap.min.js'
        onload='initEmbeddedMessaging()'>
    </script>
</body>
</html>
